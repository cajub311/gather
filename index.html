<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gather — Meetings & community, one place (Twin Cities)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0c1017; --surface:#131a24; --surface2:#1a2330; --line:#263041;
    --txt:#eef2f6; --muted:#8b9cb3; --accent:#4fd1c5; --accent-dim:#2a6b64;
    --accent2:#60a5fa; --chip:#1e2836; --live:#4ade80; --now:#fbbf24;
    --radius:12px; --shadow:0 1px 0 rgba(255,255,255,.04) inset;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:"DM Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}
  #app{display:flex;flex-direction:column;height:100vh}
  header{border-bottom:1px solid var(--line);background:var(--surface);box-shadow:var(--shadow)}
  .header-top{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 20px 10px;flex-wrap:wrap}
  .brand{display:flex;flex-direction:column;gap:2px}
  .logo{font-weight:700;font-size:20px;letter-spacing:-.3px;display:flex;align-items:center;gap:9px}
  .logo .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px rgba(79,209,197,.2)}
  .tagline{font-size:12.5px;color:var(--muted);font-weight:500}
  .header-controls{display:flex;align-items:center;gap:10px;padding:0 20px 14px;flex-wrap:wrap}
  .modes{display:flex;padding:3px;background:var(--bg);border:1px solid var(--line);border-radius:var(--radius);gap:2px}
  .modes button{background:transparent;border:none;color:var(--muted);padding:8px 14px;font-size:13px;font-weight:600;border-radius:9px;transition:color .15s,background .15s}
  .modes button:hover{color:var(--txt)}
  .modes button.on{background:var(--surface2);color:var(--txt);box-shadow:0 1px 2px rgba(0,0,0,.25)}
  .modes button.on.support{color:var(--accent)}
  .modes button.on.play{color:#c4b5fd}
  .searchbar{flex:1;min-width:200px;display:flex;gap:8px;align-items:center}
  .searchbar input{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:var(--radius);color:var(--txt);padding:10px 14px;font-size:14px;outline:none;transition:border-color .15s,box-shadow .15s}
  .searchbar input::placeholder{color:#5c6b82}
  .searchbar input:focus{border-color:var(--accent-dim);box-shadow:0 0 0 3px rgba(79,209,197,.12)}
  button{cursor:pointer;font-family:inherit}
  .btn{background:var(--bg);border:1px solid var(--line);color:var(--muted);padding:9px 12px;border-radius:var(--radius);font-size:13px;font-weight:600;white-space:nowrap;transition:border-color .15s,color .15s,background .15s}
  .btn:hover{color:var(--txt);border-color:#3d4f66}
  .btn.on{background:rgba(79,209,197,.12);border-color:var(--accent-dim);color:var(--accent)}
  main{flex:1;display:flex;min-height:0}
  #sidebar{width:400px;max-width:44vw;display:flex;flex-direction:column;border-right:1px solid var(--line);min-height:0;background:var(--surface)}
  .todbar{display:flex;gap:4px;padding:10px 14px 0;background:var(--surface)}
  .todbar .tod{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--muted);padding:7px 6px;font-size:12px;font-weight:600;border-radius:8px;transition:all .15s}
  .todbar .tod:hover{color:var(--txt);border-color:#3d4f66}
  .todbar .tod.on{background:var(--surface2);color:var(--txt);border-color:var(--accent-dim)}
  .filterbar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--line)}
  .fbtn{flex:1;display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--line);color:var(--txt);padding:8px 12px;border-radius:9px;font-size:13px;font-weight:600;text-align:left}
  .fbtn:hover{border-color:#3d4f66}
  .fbtn .chev{margin-left:auto;color:var(--muted);font-size:10px;transition:transform .15s}
  .fbtn.open .chev{transform:rotate(180deg)}
  #fCount{background:var(--accent);color:#0a1f1c;font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;margin-left:2px}
  .fclear{background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;padding:8px;visibility:hidden}
  .fclear.show{visibility:visible}
  .fclear:hover{color:var(--txt)}
  .filters{padding:12px 14px 14px;border-bottom:1px solid var(--line)}
  .filters.collapsed{display:none}
  .frow{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .frow:last-child{margin-bottom:0}
  .frow.cats{max-height:88px;overflow-y:auto;padding-right:4px}
  .frow.cats::-webkit-scrollbar{width:5px}.frow.cats::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
  .flabel{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);width:100%;margin-bottom:4px;font-weight:600}
  .chip{background:var(--chip);border:1px solid var(--line);color:var(--muted);padding:5px 10px;border-radius:999px;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:5px;transition:all .12s}
  .chip:hover{color:var(--txt);border-color:#3d4f66}
  .chip.on{background:rgba(79,209,197,.15);color:var(--accent);border-color:var(--accent-dim)}
  .chip .swatch{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .count{padding:10px 14px;font-size:12.5px;color:var(--muted);border-bottom:1px solid var(--line);line-height:1.45}
  .count b{color:var(--txt);font-weight:600}
  #list{overflow:auto;flex:1;min-height:0}
  .card{padding:14px 16px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
  .card:hover{background:var(--surface2)}
  .card.active{background:var(--bg);border-left:3px solid var(--accent);padding-left:13px}
  .card .top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
  .card .name{font-weight:600;font-size:14px;line-height:1.35;color:var(--txt);flex:1}
  .card .fell{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;color:#0a1218;white-space:nowrap;letter-spacing:.02em}
  .card .when{font-size:12.5px;color:var(--accent);margin-top:5px;font-weight:500}
  .card .where{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.4}
  .badges{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
  .b{font-size:10px;font-weight:600;padding:3px 7px;border-radius:6px;background:var(--chip);color:var(--muted);letter-spacing:.02em}
  .b.online{background:rgba(96,165,250,.12);color:#93c5fd}
  .b.hybrid{background:rgba(251,191,36,.1);color:#fcd34d}
  .b.now{background:rgba(251,191,36,.2);color:#fde68a}
  .b.ok{background:rgba(74,222,128,.1);color:var(--live)}
  .b.warn{background:rgba(251,191,36,.08);color:#fbbf24}
  .linkrow{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
  .verify{display:inline-block;font-size:12px;color:var(--accent2);font-weight:500;text-decoration:none}
  .verify:hover{text-decoration:underline}
  .verify.vbtn{color:var(--live);border:1px solid rgba(74,222,128,.25);background:rgba(74,222,128,.06);padding:4px 10px;border-radius:8px}
  .verify.vbtn:hover{border-color:rgba(74,222,128,.45);text-decoration:none}
  #map{flex:1;min-height:0;background:#0a0e14}
  .leaflet-popup-content-wrapper{border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.35)}
  .leaflet-popup-content{font-family:inherit;margin:12px 14px;line-height:1.4}
  .pop .pn{font-weight:600;font-size:14px;color:#0f1419}
  .pop .pf{font-size:11px;font-weight:600;color:#64748b;margin:2px 0}
  .pop .pw{font-size:12px;color:#334155;margin-top:4px}
  .pop a{color:#0d9488;font-weight:600;font-size:12px}
  .footer{padding:10px 14px;font-size:11px;color:var(--muted);border-top:1px solid var(--line);line-height:1.5}
  .footer code{font-size:10px;background:var(--bg);padding:1px 5px;border-radius:4px;border:1px solid var(--line)}
  .empty{padding:36px 20px;text-align:center;color:var(--muted);font-size:13px;line-height:1.5}
  .showmore{margin:12px 14px 18px;padding:11px;text-align:center;background:transparent;border:1px solid var(--line);border-radius:var(--radius);color:var(--accent2);font-size:13px;font-weight:600}
  .showmore:hover{background:var(--bg);border-color:#3d4f66}
  .loading{display:inline-block;color:var(--muted)}
  .loading .spin{display:inline-block;width:8px;height:8px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-1px;margin-right:6px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .crisis a{color:#fca5a5;font-size:12px;font-weight:600;text-decoration:none;border:1px solid rgba(252,165,165,.2);padding:6px 12px;border-radius:var(--radius);white-space:nowrap;transition:background .15s,border-color .15s}
  .crisis a:hover{background:rgba(252,165,165,.06);border-color:rgba(252,165,165,.35)}
  .marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{background:rgba(79,209,197,.15)!important}
  .marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{background:var(--accent)!important;color:#0a1f1c!important;font-weight:700}
  @media(max-width:760px){
    .header-top{padding:12px 14px 8px}
    .header-controls{padding:0 14px 12px}
    main{flex-direction:column}
    #sidebar{width:100%;max-width:100%;height:52%;order:2}
    #map{height:48%;order:1}
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-top">
      <div class="brand">
        <div class="logo"><span class="dot"></span>Gather</div>
        <div class="tagline">Twin Cities meetings &amp; community, one map</div>
      </div>
      <div class="crisis" title="Free, confidential, 24/7"><a href="tel:988">Crisis support: 988</a></div>
    </div>
    <div class="header-controls">
      <div class="modes">
        <button id="mSupport" class="on support" data-mode="support">Support</button>
        <button id="mPlay" data-mode="activities">Activities</button>
      </div>
      <div class="searchbar">
        <input id="q" type="search" placeholder="Search name, place, or topic…" autocomplete="off" />
        <button class="btn" id="nearme" type="button">Near me</button>
        <button class="btn" id="nowbtn" type="button">Happening now</button>
      </div>
    </div>
  </header>
  <main>
    <div id="sidebar">
      <div class="todbar" id="todbar">
        <button class="tod on" data-tod="">All day</button>
        <button class="tod" data-tod="morning">Morning</button>
        <button class="tod" data-tod="afternoon">Afternoon</button>
        <button class="tod" data-tod="evening">Evening</button>
      </div>
      <div class="filterbar">
        <button class="fbtn" id="fToggle" type="button">Filters <span id="fCount" hidden></span><span class="chev">▼</span></button>
        <button class="fclear" id="fClear" type="button">Clear</button>
      </div>
      <div class="filters collapsed" id="filters">
        <div class="frow cats" id="catFilters"><span class="flabel" id="catLabel">Program</span></div>
        <div class="frow" id="dayFilters"><span class="flabel">Day</span></div>
        <div class="frow" id="fmtFilters"><span class="flabel">Format</span></div>
      </div>
      <div class="count" id="count"></div>
      <div id="list"></div>
      <div class="footer" id="src"></div>
    </div>
    <div id="map"></div>
  </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

/* ===== engine ===== */
let DATA=[], META=FELLOWSHIPS;
let LIVE=[], LIVE_CATS=new Set(), LAST_UPDATED=null, SOURCE_INFO=[], LIVE_LOADING=true;
let LIVE_EVENTS=[], EVENTS_UPDATED=null, EVENT_SOURCES=[], EVENTS_LOADING=true;
const RENDER_STEP=150;
const state={mode:"support",cat:new Set(),day:null,fmt:null,tod:"",nowOnly:false,q:"",near:null,limit:RENDER_STEP};
function inTod(time,tod){if(!tod)return true;const h=parseInt(time.split(":")[0],10);
  if(tod==="morning")return h>=5&&h<12;
  if(tod==="afternoon")return h>=12&&h<17;
  if(tod==="evening")return h>=17||h<5;return true;}

// Support listings = live feeds (verified) + curated samples for fellowships
// that don't have a live feed yet (clearly marked unverified).
function supportMeetings(){
  const curated=SUPPORT.map(m=>({...m,verified:false}));
  const keep=curated.filter(m=>!LIVE_CATS.has(m.cat));
  return [...LIVE,...keep];
}
// Activities = live venue/calendar events (verified) + curated sample groups (unverified)
function activityItems(){
  const curated=PLAY.map(m=>({...m,verified:false}));
  return [...LIVE_EVENTS,...curated];
}
let map,markers,userMarker,activeId=null;

function fmtTime(t){let[h,m]=t.split(":").map(Number);const ap=h<12?"AM":"PM";h=h%12||12;return `${h}:${String(m).padStart(2,"0")} ${ap}`;}
function nowInfo(){const d=new Date();return{day:d.getDay(),mins:d.getHours()*60+d.getMinutes()};}
function isNow(m){const n=nowInfo();if(m.day!==n.day)return false;let[h,mm]=m.time.split(":").map(Number);const s=h*60+mm;return n.mins>=s-15&&n.mins<=s+m.dur;}
function dist(a,b,c,d){const R=3959,r=x=>x*Math.PI/180;const dLat=r(c-a),dLon=r(d-b);const x=Math.sin(dLat/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}

function buildFilters(){
  const cf=document.getElementById("catFilters");
  cf.querySelectorAll(".chip").forEach(n=>n.remove());
  document.getElementById("catLabel").textContent=state.mode==="support"?"Fellowship":"Activity type";
  Object.entries(META).forEach(([k,v])=>{
    const c=document.createElement("button");
    c.className="chip";c.innerHTML=`<span class="swatch" style="background:${v.color}"></span>${k}`;
    c.onclick=()=>{state.cat.has(k)?state.cat.delete(k):state.cat.add(k);c.classList.toggle("on");render();};
    cf.appendChild(c);
  });
  // day + format only once
  const dc=document.getElementById("dayFilters");
  if(dc.querySelectorAll(".chip").length===0){
    DAYS.forEach((d,i)=>{const c=document.createElement("button");c.className="chip";c.textContent=d;
      c.onclick=()=>{state.day=state.day===i?null:i;[...dc.children].forEach(x=>x.classList?.remove?.("on"));if(state.day===i)c.classList.add("on");render();};dc.appendChild(c);});
    const mc=document.getElementById("fmtFilters");
    [["in-person","In-person"],["online","Online"],["hybrid","Hybrid"]].forEach(([k,lbl])=>{
      const c=document.createElement("button");c.className="chip";c.textContent=lbl;
      c.onclick=()=>{state.fmt=state.fmt===k?null:k;[...mc.children].forEach(x=>x.classList?.remove?.("on"));if(state.fmt===k)c.classList.add("on");render();};mc.appendChild(c);});
  }
}

function filtered(){
  let list=DATA.filter(m=>{
    if(state.cat.size&&!state.cat.has(m.cat))return false;
    if(state.day!==null&&m.day!==state.day)return false;
    if(state.fmt&&m.fmt!==state.fmt)return false;
    if(state.tod&&!inTod(m.time,state.tod))return false;
    if(state.nowOnly&&!isNow(m))return false;
    if(state.q){const h=(m.name+" "+m.loc+" "+m.addr+" "+(m.types||[]).join(" ")+" "+META[m.cat].name).toLowerCase();if(!h.includes(state.q.toLowerCase()))return false;}
    return true;
  });
  if(state.near){list.forEach(m=>m._d=dist(state.near[0],state.near[1],m.lat,m.lng));list.sort((a,b)=>a._d-b._d);}
  else list.sort((a,b)=>a.day-b.day||a.time.localeCompare(b.time));
  return list;
}

function activeFilterCount(){
  return state.cat.size+(state.day!==null?1:0)+(state.fmt?1:0)+(state.tod?1:0)+(state.nowOnly?1:0);
}
function updateFilterUI(){
  const n=activeFilterCount();
  const c=document.getElementById("fCount");
  if(n){c.textContent=n;c.hidden=false;}else{c.hidden=true;}
  document.getElementById("fClear").classList.toggle("show",n>0);
}
function clearFilters(){
  state.cat.clear();state.day=null;state.fmt=null;state.tod="";state.nowOnly=false;
  document.querySelectorAll("#dayFilters .chip,#fmtFilters .chip").forEach(x=>x.classList.remove("on"));
  document.querySelectorAll("#todbar .tod").forEach((b,i)=>b.classList.toggle("on",i===0));
  document.getElementById("nowbtn").classList.remove("on");
  buildFilters();render();
}
let _lastSig="";
function render(){
  const sig=[state.mode,[...state.cat].sort().join(","),state.day,state.fmt,state.tod,state.nowOnly,state.q,state.near].join("|");
  if(sig!==_lastSig){state.limit=RENDER_STEP;_lastSig=sig;}
  const list=filtered();
  const el=document.getElementById("list");el.innerHTML="";
  const word=state.mode==="support"?"fellowships":"activity types";
  const loadingNow=state.mode==="support"?LIVE_LOADING:EVENTS_LOADING;
  const loading=loadingNow?'<span class="loading"><span class="spin"></span>loading live…</span> ':"";
  document.getElementById("count").innerHTML=loading+`<b>${list.length}</b> ${state.mode==="support"?"meeting":"group/event"}${list.length!==1?"s":""} ${state.near?"near you":"across "+new Set(DATA.map(m=>m.cat)).size+" "+word}`;
  updateFilterUI();
  if(!list.length)el.innerHTML='<div class="empty">Nothing matches these filters.<br>Try removing one.</div>';
  const shown=list.slice(0,state.limit);
  shown.forEach(m=>{
    const id=m._id,fc=META[m.cat].color,now=isNow(m);
    const card=document.createElement("div");card.className="card"+(activeId===id?" active":"");
    const trust=m.verified?'<span class="b ok">Verified</span>':'<span class="b warn">Sample data</span>';
    const whenLbl=m.dateLabel?m.dateLabel:DAYS[m.day];
    // link row: join/details (if the meeting has its own link) + a verify button to the official finder
    const join=m.url?`<a class="verify" href="${m.url}" target="_blank" rel="noopener">${m.fmt==="in-person"?"Details":"Join / details"} ↗</a>`:"";
    const official=state.mode==="support"?FINDERS[m.cat]:null;
    const verify=(official&&official!==m.url)?`<a class="verify vbtn" href="${official}" target="_blank" rel="noopener">Official finder ↗</a>`:"";
    card.innerHTML=`<div class="top"><div class="name">${m.name}</div><div class="fell" style="background:${fc}">${m.cat}</div></div>
      <div class="when">${whenLbl} · ${fmtTime(m.time)}${m._d!=null?` · ${m._d.toFixed(1)} mi`:""}</div>
      <div class="where">${m.loc} — ${m.addr}</div>
      <div class="badges">${now?'<span class="b now">Now</span>':''}
        ${m.fmt==="online"?'<span class="b online">Online</span>':m.fmt==="hybrid"?'<span class="b hybrid">Hybrid</span>':'<span class="b">In person</span>'}
        ${trust}
        ${(m.types||[]).slice(0,2).map(t=>`<span class="b">${t}</span>`).join("")}</div>
      <div class="linkrow">${join}${verify}</div>`;
    card.onclick=()=>{activeId=id;render();if(m.lat){map.setView([m.lat,m.lng],14);m._marker?.openPopup();}};
    el.appendChild(card);
  });
  if(list.length>state.limit){
    const more=document.createElement("div");more.className="showmore";
    const rest=list.length-state.limit;
    more.textContent=`Show ${Math.min(RENDER_STEP,rest)} more (${rest} hidden) ↓`;
    more.onclick=()=>{state.limit+=RENDER_STEP;render();};
    el.appendChild(more);
  }
  drawMarkers(list);
}

function drawMarkers(list){
  markers.clearLayers();
  list.forEach(m=>{if(!m.lat)return;const fc=META[m.cat].color;
    const mk=L.circleMarker([m.lat,m.lng],{radius:7,fillColor:fc,color:"#0c1017",weight:2,fillOpacity:.9});
    mk.bindPopup(`<div class="pop"><div class="pn">${m.name}</div><div class="pf">${META[m.cat].name}</div>
      <div class="pw">${DAYS[m.day]} ${fmtTime(m.time)} · ${m.fmt}</div><div class="pw">${m.loc}<br>${m.addr}</div>
      ${m.url?`<a href="${m.url}" target="_blank">Open link ↗</a>`:""}</div>`);
    mk.addTo(markers);m._marker=mk;});
}

function setMode(mode){
  state.mode=mode;state.cat.clear();activeId=null;
  const ms=document.getElementById("mSupport");ms.classList.toggle("on",mode==="support");ms.classList.toggle("support",mode==="support");
  const mp=document.getElementById("mPlay");mp.classList.toggle("on",mode==="activities");mp.classList.toggle("play",mode==="activities");
  if(mode==="support"){META=FELLOWSHIPS;DATA=supportMeetings().map((m,i)=>({...m,_id:"s"+i}));}
  else{META=ACTIVITIES;DATA=activityItems().map((m,i)=>({...m,_id:"p"+i}));}
  document.getElementById("q").placeholder=mode==="support"?"Search name, city, or topic (women's, beginners…)":"Search name, venue, or interest (chess, yoga, French…)";
  buildFilters();updateFooter();render();
}
function updateFooter(){
  const s=document.getElementById("src");
  if(state.mode==="support"){
    const liveN=LIVE.length;
    const curatedN=SUPPORT.filter(m=>!LIVE_CATS.has(m.cat)).length;
    if(liveN){
      const when=LAST_UPDATED?new Date(LAST_UPDATED).toLocaleString([], {month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}):"";
      const ok=SOURCE_INFO.filter(x=>x.ok).map(x=>`${x.name} (${x.count})`).join(", ");
      s.innerHTML=`<span style="color:var(--live)">${liveN} verified</span> live meetings`+(curatedN?` + ${curatedN} sample listings`:"")+`. Sources: ${ok}.`+(when?` Updated ${when}.`:"")+` Confirm on official sites. Not affiliated with any program.`;
    }else{
      s.innerHTML=`<b>${SUPPORT.length}</b> sample meetings — live feeds load from <code>/api/meetings</code> when deployed. Not affiliated with any program.`;
    }
  }else{
    const liveN=LIVE_EVENTS.length;
    if(liveN){
      const when=EVENTS_UPDATED?new Date(EVENTS_UPDATED).toLocaleString([], {month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}):"";
      const ok=EVENT_SOURCES.filter(x=>x.ok).map(x=>x.name).join(", ");
      s.innerHTML=`<span style="color:var(--live)">${liveN} verified</span> events (45 days) + ${PLAY.length} sample groups. Venues: ${ok}.`+(when?` Updated ${when}.`:"");
    }else{
      s.innerHTML=`<b>${PLAY.length}</b> sample activities — live events load from <code>/api/events</code> when deployed.`;
    }
  }
}

async function loadLive(){
  try{
    const res=await fetch("/api/meetings",{headers:{Accept:"application/json"}});
    if(!res.ok)throw 0;
    const data=await res.json();
    LIVE=(data.meetings||[]).map(m=>({...m,verified:true}));
    LIVE_CATS=new Set(LIVE.map(m=>m.cat));
    LAST_UPDATED=data.updated||null;
    SOURCE_INFO=data.sources||[];
  }catch(e){/* backend unavailable (e.g. opened as a local file) — curated samples still show */}
  finally{
    LIVE_LOADING=false;
    if(state.mode==="support"){
      // swap in live data without wiping the user's active filters
      DATA=supportMeetings().map((m,i)=>({...m,_id:"s"+i}));
      updateFooter();render();
    }
  }
}

async function loadEvents(){
  try{
    const res=await fetch("/api/events",{headers:{Accept:"application/json"}});
    if(!res.ok)throw 0;
    const data=await res.json();
    LIVE_EVENTS=(data.events||[]).map(m=>({...m,verified:true}));
    EVENTS_UPDATED=data.updated||null;
    EVENT_SOURCES=data.sources||[];
  }catch(e){/* backend unavailable — curated samples still show */}
  finally{
    EVENTS_LOADING=false;
    if(state.mode==="activities"){
      DATA=activityItems().map((m,i)=>({...m,_id:"p"+i}));
      updateFooter();render();
    }
  }
}

function init(){
  map=L.map("map",{zoomControl:true}).setView([44.9537,-93.0900],11);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{attribution:"© OpenStreetMap © CARTO",maxZoom:19}).addTo(map);
  markers=L.markerClusterGroup({chunkedLoading:true,maxClusterRadius:50,spiderfyOnMaxZoom:true,showCoverageOnHover:false}).addTo(map);
  document.getElementById("mSupport").onclick=()=>setMode("support");
  document.getElementById("mPlay").onclick=()=>setMode("activities");
  document.querySelectorAll("#todbar .tod").forEach(btn=>{
    btn.onclick=()=>{
      const v=btn.dataset.tod||"";
      if(!v) state.tod="";
      else state.tod=state.tod===v?"":v;
      document.querySelectorAll("#todbar .tod").forEach(b=>{
        const bv=b.dataset.tod||"";
        b.classList.toggle("on", bv==="" ? !state.tod : bv===state.tod);
      });
      render();
    };
  });
  document.getElementById("fToggle").onclick=function(){
    const f=document.getElementById("filters");
    const collapsed=f.classList.toggle("collapsed");
    this.classList.toggle("open",!collapsed);
  };
  document.getElementById("fClear").onclick=clearFilters;
  document.getElementById("q").addEventListener("input",e=>{state.q=e.target.value;render();});
  document.getElementById("nowbtn").onclick=function(){state.nowOnly=!state.nowOnly;this.classList.toggle("on");render();};
  document.getElementById("nearme").onclick=function(){
    const me=this;
    if(!navigator.geolocation){state.near=[44.9537,-93.0900];me.classList.add("on");render();return;}
    navigator.geolocation.getCurrentPosition(p=>{state.near=[p.coords.latitude,p.coords.longitude];me.classList.add("on");
      if(userMarker)map.removeLayer(userMarker);
      userMarker=L.circleMarker(state.near,{radius:8,fillColor:"#60a5fa",color:"#eef2f6",weight:2,fillOpacity:.95}).addTo(map).bindPopup("You are here");
      map.setView(state.near,12);render();},()=>{state.near=[44.9537,-93.0900];me.classList.add("on");render();});
  };
  setMode("support");
  loadLive();
  loadEvents();
}
init();
