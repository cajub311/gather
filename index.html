<html lang="en">
<head>
<meta charset="UTF-8" />

<title>Gather — Meetings & community, one place (Twin Cities)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
  :root{
    --bg:#0f1419; --panel:#171d26; --panel2:#1f2734; --line:#2a3441;

    --chip:#243042; --live:#34d399; --now:#fbbf24; --play:#c084fc;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--txt)}
  #app{display:flex;flex-direction:column;height:100vh}
  header{padding:12px 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#141b25,#0f1419);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:19px;letter-spacing:.2px}
  .logo .dot{width:13px;height:13px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 14px var(--accent)}
  .tag{font-size:12px;color:var(--muted);font-weight:500}
  /* mode switch */
  .modes{display:flex;gap:0;background:var(--panel2);border:1px solid var(--line);border-radius:11px;overflow:hidden}
  .modes button{background:transparent;border:none;color:var(--muted);padding:9px 15px;font-size:13.5px;font-weight:700}
  .modes button.on{background:linear-gradient(135deg,#0ea5a4,#0284c7);color:#fff}
  .modes button.on.play{background:linear-gradient(135deg,#7c3aed,#c026d3)}
  .searchbar{flex:1;min-width:220px;display:flex;gap:8px;align-items:center}
  .searchbar input{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--txt);padding:10px 13px;font-size:14px;outline:none}
  .searchbar input:focus{border-color:var(--accent2)}
  button{cursor:pointer;font-family:inherit}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:10px 13px;border-radius:10px;font-size:13px;font-weight:600;white-space:nowrap}
  .btn:hover{border-color:var(--accent2)}
  .btn.on{background:linear-gradient(135deg,#0ea5a4,#0284c7);border:none;color:#fff}
  main{flex:1;display:flex;min-height:0}
  #sidebar{width:430px;max-width:46vw;display:flex;flex-direction:column;border-right:1px solid var(--line);min-height:0}
  .filters{padding:12px 14px;border-bottom:1px solid var(--line);background:var(--panel)}
  .frow{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
  .frow:last-child{margin-bottom:0}
  .flabel{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);width:100%;margin-bottom:2px}
  .chip{background:var(--chip);border:1px solid transparent;color:var(--txt);padding:6px 11px;border-radius:999px;font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px}
  .chip:hover{border-color:var(--accent2)}
  .chip.on{background:var(--accent);color:#06302c;border-color:var(--accent)}
  .chip .swatch{width:9px;height:9px;border-radius:50%}
  .count{padding:8px 14px;font-size:12.5px;color:var(--muted);border-bottom:1px solid var(--line);background:var(--panel)}
  .count b{color:var(--txt)}
  #list{overflow:auto;flex:1;min-height:0}
  .card{padding:13px 14px;border-bottom:1px solid var(--line);cursor:pointer}
  .card:hover{background:var(--panel)}
  .card.active{background:var(--panel2);box-shadow:inset 3px 0 0 var(--accent)}
  .card .top{display:flex;justify-content:space-between;gap:8px;align-items:baseline}
  .card .name{font-weight:700;font-size:14.5px;line-height:1.25}
  .card .fell{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;color:#06302c;white-space:nowrap}
  .card .when{font-size:13px;color:var(--accent);margin-top:3px;font-weight:600}
  .card .where{font-size:12.5px;color:var(--muted);margin-top:3px}
  .badges{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
  .b{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:5px;background:var(--chip);color:var(--muted)}
  .b.online{background:#0c3b4a;color:#7dd3fc}
  .b.hybrid{background:#3a2f10;color:#fcd34d}
  .b.now{background:var(--now);color:#3a2a00}
  .b.live{background:#0c3a2a;color:var(--live)}
  .b.ok{background:#0c3a2a;color:var(--live)}
  .b.warn{background:#3a2410;color:#fbbf24}
  .verify{display:inline-block;margin-top:6px;font-size:11.5px;color:var(--accent2);font-weight:600;text-decoration:none}
  .verify:hover{text-decoration:underline}
  #map{flex:1;min-height:0}
  .leaflet-popup-content{font-family:inherit;margin:12px 14px}
  .pop .pn{font-weight:700;font-size:14px;color:#0f1419}
  .pop .pf{font-size:11px;font-weight:700;color:#475569;margin:2px 0}
  .pop .pw{font-size:12.5px;color:#0f1419;margin-top:4px}
  .pop a{color:#0284c7;font-weight:600;font-size:12.5px}
  .footer{padding:7px 14px;font-size:11px;color:var(--muted);border-top:1px solid var(--line);background:var(--panel)}
  .empty{padding:30px 18px;text-align:center;color:var(--muted);font-size:13px}
  .showmore{margin:10px 14px 16px;padding:10px;text-align:center;background:var(--panel2);border:1px dashed var(--line);border-radius:10px;color:var(--accent2);font-size:13px;font-weight:600}
  .showmore:hover{border-color:var(--accent2)}
  .loading{display:inline-block;color:var(--muted)}
  .loading .spin{display:inline-block;width:9px;height:9px;border:2px solid var(--line);border-top-color:var(--accent2);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-1px;margin-right:5px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .crisis{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted)}
  .crisis a{color:#fca5a5;font-weight:700;text-decoration:none;border:1px solid #5b2330;background:#2a1318;padding:5px 10px;border-radius:8px;white-space:nowrap}
  .crisis a:hover{border-color:#fca5a5}
  @media(max-width:760px){
    main{flex-direction:column} #sidebar{width:100%;max-width:100%;height:55%} #map{height:45%}
  }
</style>
</head>

</div>

// Support listings = live feeds (verified) + curated samples for fellowships
// that don't have a live feed yet (clearly marked unverified).
function supportMeetings(){
  const curated=SUPPORT.map(m=>({...m,verified:false}));
  const keep=curated.filter(m=>!LIVE_CATS.has(m.cat));
  return [...LIVE,...keep];
}
let map,markers,userMarker,activeId=null;

function fmtTime(t){let[h,m]=t.split(":").map(Number);const ap=h<12?"AM":"PM";h=h%12||12;return `${h}:${String(m).padStart(2,"0")} ${ap}`;}
function nowInfo(){const d=new Date();return{day:d.getDay(),mins:d.getHours()*60+d.getMinutes()};}
function isNow(m){const n=nowInfo();if(m.day!==n.day)return false;let[h,mm]=m.time.split(":").map(Number);const s=h*60+mm;return n.mins>=s-15&&n.mins<=s+m.dur;}
function dist(a,b,c,d){const R=3959,r=x=>x*Math.PI/180;const dLat=r(c-a),dLon=r(d-b);const x=Math.sin(dLat/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}

function buildFilters(){
  const cf=document.getElementById("catFilters");
  cf.querySelectorAll(".chip").forEach(n=>n.remove());
  document.getElementById("catLabel").textContent=state.mode==="support"?"Fellowship":"Activity type";
  Object.entries(META).forEach(([k,v])=>{
    const c=document.createElement("button");
    c.className="chip";c.innerHTML=`<span class="swatch" style="background:${v.color}"></span>${k}`;
    c.onclick=()=>{state.cat.has(k)?state.cat.delete(k):state.cat.add(k);c.classList.toggle("on");render();};
    cf.appendChild(c);
  });
  // day + format only once
  const dc=document.getElementById("dayFilters");
  if(dc.querySelectorAll(".chip").length===0){
    DAYS.forEach((d,i)=>{const c=document.createElement("button");c.className="chip";c.textContent=d;
      c.onclick=()=>{state.day=state.day===i?null:i;[...dc.children].forEach(x=>x.classList?.remove?.("on"));if(state.day===i)c.classList.add("on");render();};dc.appendChild(c);});
    const mc=document.getElementById("fmtFilters");
    [["in-person","In-person"],["online","Online"],["hybrid","Hybrid"]].forEach(([k,lbl])=>{
      const c=document.createElement("button");c.className="chip";c.textContent=lbl;
      c.onclick=()=>{state.fmt=state.fmt===k?null:k;[...mc.children].forEach(x=>x.classList?.remove?.("on"));if(state.fmt===k)c.classList.add("on");render();};mc.appendChild(c);});
  }
}

function filtered(){
  let list=DATA.filter(m=>{
    if(state.cat.size&&!state.cat.has(m.cat))return false;
    if(state.day!==null&&m.day!==state.day)return false;
    if(state.fmt&&m.fmt!==state.fmt)return false;
    if(state.nowOnly&&!isNow(m))return false;
    if(state.q){const h=(m.name+" "+m.loc+" "+m.addr+" "+(m.types||[]).join(" ")+" "+META[m.cat].name).toLowerCase();if(!h.includes(state.q.toLowerCase()))return false;}
    return true;
  });
  if(state.near){list.forEach(m=>m._d=dist(state.near[0],state.near[1],m.lat,m.lng));list.sort((a,b)=>a._d-b._d);}
  else list.sort((a,b)=>a.day-b.day||a.time.localeCompare(b.time));
  return list;
}

let _lastSig="";
function render(){
  const sig=[state.mode,[...state.cat].sort().join(","),state.day,state.fmt,state.nowOnly,state.q,state.near].join("|");
  if(sig!==_lastSig){state.limit=RENDER_STEP;_lastSig=sig;}
  const list=filtered();
  const el=document.getElementById("list");el.innerHTML="";
  const word=state.mode==="support"?"fellowships":"activity types";
  const loading=state.mode==="support"&&LIVE_LOADING?'<span class="loading"><span class="spin"></span>loading live…</span> ':"";
  document.getElementById("count").innerHTML=loading+`<b>${list.length}</b> ${state.mode==="support"?"meeting":"group/event"}${list.length!==1?"s":""} ${state.near?"near you":"across "+new Set(DATA.map(m=>m.cat)).size+" "+word}`;
  if(!list.length)el.innerHTML='<div class="empty">Nothing matches these filters.<br>Try removing one.</div>';
  const shown=list.slice(0,state.limit);
  shown.forEach(m=>{
    const id=m._id,fc=META[m.cat].color,now=isNow(m);
    const card=document.createElement("div");card.className="card"+(activeId===id?" active":"");
    const trust=m.mode==="play"?"":(m.verified?'<span class="b ok">✓ VERIFIED</span>':'<span class="b warn">⚠ UNVERIFIED</span>');
    card.innerHTML=`<div class="top"><div class="name">${m.name}</div><div class="fell" style="background:${fc}">${m.cat}</div></div>
      <div class="when">${DAYS[m.day]} · ${fmtTime(m.time)}${m._d!=null?` · ${m._d.toFixed(1)} mi`:""}</div>
      <div class="where">${m.loc} — ${m.addr}</div>
      <div class="badges">${now?'<span class="b now">● HAPPENING NOW</span>':''}
        ${m.fmt==="online"?'<span class="b online">ONLINE</span>':m.fmt==="hybrid"?'<span class="b hybrid">HYBRID</span>':'<span class="b">IN-PERSON</span>'}
        ${state.mode==="support"?trust:''}
        ${(m.types||[]).map(t=>`<span class="b">${t}</span>`).join("")}</div>
      ${m.url?`<a class="verify" href="${m.url}" target="_blank" rel="noopener">${m.fmt==="in-person"?"Details":"Join / details"} ↗</a>`:(state.mode==="support"&&!m.verified?'<a class="verify" href="https://www.aastpaul.org/meetings" target="_blank" rel="noopener">Verify on official source ↗</a>':'')}`;
    card.onclick=()=>{activeId=id;render();if(m.lat){map.setView([m.lat,m.lng],14);m._marker?.openPopup();}};
    el.appendChild(card);
  });
  if(list.length>state.limit){
    const more=document.createElement("div");more.className="showmore";
    const rest=list.length-state.limit;
    more.textContent=`Show ${Math.min(RENDER_STEP,rest)} more (${rest} hidden) ↓`;
    more.onclick=()=>{state.limit+=RENDER_STEP;render();};
    el.appendChild(more);
  }
  drawMarkers(list);
}

function drawMarkers(list){
  markers.clearLayers();
  list.forEach(m=>{if(!m.lat)return;const fc=META[m.cat].color;
    const mk=L.circleMarker([m.lat,m.lng],{radius:8,fillColor:fc,color:"#0f1419",weight:2,fillOpacity:.95});
    mk.bindPopup(`<div class="pop"><div class="pn">${m.name}</div><div class="pf">${META[m.cat].name}</div>
      <div class="pw">${DAYS[m.day]} ${fmtTime(m.time)} · ${m.fmt}</div><div class="pw">${m.loc}<br>${m.addr}</div>
      ${m.url?`<a href="${m.url}" target="_blank">Open link ↗</a>`:""}</div>`);
    mk.addTo(markers);m._marker=mk;});
}

function setMode(mode){
  state.mode=mode;state.cat.clear();activeId=null;
  document.getElementById("mSupport").classList.toggle("on",mode==="support");
  const mp=document.getElementById("mPlay");mp.classList.toggle("on",mode==="activities");mp.classList.toggle("play",mode==="activities");
  if(mode==="support"){META=FELLOWSHIPS;DATA=supportMeetings().map((m,i)=>({...m,_id:"s"+i}));}
  else{META=ACTIVITIES;DATA=PLAY.map((m,i)=>({...m,_id:"p"+i}));}
  document.getElementById("q").placeholder=mode==="support"?"Search name, city, or topic (women's, beginners…)":"Search name, venue, or interest (chess, yoga, French…)";
  buildFilters();updateFooter();render();
}
function updateFooter(){
  const s=document.getElementById("src");
  if(state.mode==="support"){
    const liveN=LIVE.length;
    const curatedN=SUPPORT.filter(m=>!LIVE_CATS.has(m.cat)).length;
    if(liveN){
      const when=LAST_UPDATED?new Date(LAST_UPDATED).toLocaleString([], {month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}):"";
      const ok=SOURCE_INFO.filter(x=>x.ok).map(x=>`${x.name} (${x.count})`).join(", ");
      s.innerHTML=`<span style="color:var(--live)">◉ ${liveN} live verified</span> meetings`+(curatedN?` + ${curatedN} curated <span style="color:#fbbf24">⚠ unverified</span>`:"")+`. Live: ${ok}.`+(when?` Updated ${when}.`:"")+` Always confirm details on the official source. Not affiliated with any program.`;
    }else{
      s.innerHTML=`<b>${SUPPORT.length} curated</b> support meetings <span style="color:#fbbf24">⚠ unverified</span> — live feeds load from <code>/api/meetings</code> when deployed. Not affiliated with any program.`;
    }
  }else{
    s.innerHTML=`Sources: <b>${PLAY.length} sample</b> community activities & groups (Twin Cities). In the real app these come from Meetup, library/parks calendars &amp; venue listings.`;
  }
}

async function loadLive(){
  try{
    const res=await fetch("/api/meetings",{headers:{Accept:"application/json"}});
    if(!res.ok)throw 0;
    const data=await res.json();
    LIVE=(data.meetings||[]).map(m=>({...m,verified:true}));
    LIVE_CATS=new Set(LIVE.map(m=>m.cat));
    LAST_UPDATED=data.updated||null;
    SOURCE_INFO=data.sources||[];
  }catch(e){/* backend unavailable (e.g. opened as a local file) — curated samples still show */}
  finally{
    LIVE_LOADING=false;
    if(state.mode==="support"){
      // swap in live data without wiping the user's active filters
      DATA=supportMeetings().map((m,i)=>({...m,_id:"s"+i}));
      updateFooter();render();
    }
  }
}

function init(){
  map=L.map("map",{zoomControl:true}).setView([44.9537,-93.0900],11);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{attribution:"© OpenStreetMap © CARTO",maxZoom:19}).addTo(map);
  markers=L.markerClusterGroup({chunkedLoading:true,maxClusterRadius:50,spiderfyOnMaxZoom:true,showCoverageOnHover:false}).addTo(map);
  document.getElementById("mSupport").onclick=()=>setMode("support");
  document.getElementById("mPlay").onclick=()=>setMode("activities");
  document.getElementById("q").addEventListener("input",e=>{state.q=e.target.value;render();});
  document.getElementById("nowbtn").onclick=function(){state.nowOnly=!state.nowOnly;this.classList.toggle("on");render();};
  document.getElementById("nearme").onclick=function(){
    const me=this;
    if(!navigator.geolocation){state.near=[44.9537,-93.0900];me.classList.add("on");render();return;}
    navigator.geolocation.getCurrentPosition(p=>{state.near=[p.coords.latitude,p.coords.longitude];me.classList.add("on");
      if(userMarker)map.removeLayer(userMarker);
      userMarker=L.circleMarker(state.near,{radius:9,fillColor:"#38bdf8",color:"#fff",weight:3,fillOpacity:1}).addTo(map).bindPopup("You are here");
      map.setView(state.near,12);render();},()=>{state.near=[44.9537,-93.0900];me.classList.add("on");render();});
  };
  setMode("support");
  loadLive();
}
init();
</script>
